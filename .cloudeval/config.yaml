# CloudEval project configuration for this repository.
# Keep this file in source control so CloudEval and CI use the same entry point and gates.

version: 1

stacks:
  - id: production-reference
    name: Production reference architecture
    entry: azuredeploy.json
    parameters: azuredeploy.parameters.json

resolve:
  linked_templates: true

reports:
  default_profile: standard

ci:
  gates:
    # required: fail the CI review when a configured gate fails.
    # warn: report failures in the PR comment but do not fail CI.
    enforcement: required

    # Adoption baseline for this demo PR. Teams often start with a known
    # baseline and raise the threshold after the first remediation cycle.
    overall_score_min: 20

    # Optional per-pillar minimums. Omitted pillars use pillar_score_min.
    pillar_score_min: 15
    pillar_score_mins:
      security: 15
      reliability: 15
      cost_optimization: 15
      operational_excellence: 40
      performance_efficiency: 15

    # This passing-baseline demo reports inherited risk and validation debt
    # without blocking the PR. Production repositories should usually keep
    # these enabled after the baseline has been remediated.
    fail_on_high_risk: false
    fail_on_validation_errors: false

    # Monthly budget gate for the estimated architecture cost.
    max_monthly_cost: 500
